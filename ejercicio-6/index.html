<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tip Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
  <body>
    <div class="container">
        <fieldset>
            <legend>Tip Calculator</legend>
            <form>
                <div class="row">
                    <div class="col-6">
                        <select id="origin-unit" class="form-select" aria-label="Default select example">
                            <option selected>Unidad de origen</option>
                            <option value="cel">Celsius</option>
                            <option value="far">Fahrenheit</option>
                            <option value="ml">Miles</option>
                            <option value="km">Kilometers</option>
                            <option value="pd">Pounds</option>
                            <option value="kg">Kilograms</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <select id="destination-unit" class="form-select" aria-label="Default select example">
                            <option selected>Unidad de destino</option>
                            <option value="cel">Celsius</option>
                            <option value="far">Fahrenheit</option>
                            <option value="ml">Miles</option>
                            <option value="km">Kilometers</option>
                            <option value="pd">Pounds</option>
                            <option value="kg">Kilograms</option>

                        </select>
                    </div>
                    <div class="col-6 mt-3">
                        <input id="value" type="number" class="form-control" placeholder="Cantidad" id="amount">
                    </div>
                    <div class="col-6 mt-3">
                        <button id="convert" type="button" class="btn btn-primary">Convertir</button>

                    </div>
                </div>
            </form>
            <div class="mt-3">
                <h5>0: <span id="unit-result">Unidad</span></h5>
            </div>
        </fieldset>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
        <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">Datos invalidos</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <p id="message"></p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
