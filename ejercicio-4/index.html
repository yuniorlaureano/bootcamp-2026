<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Character Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
  <body>
    <div class="container">
        <h1>Character Counter</h1>
        <div class="row">
            <div class="col-12">
                <textarea id="area-character" class="form-control" rows="5"></textarea>
            </div>
            <div class="col-2">
                <input type="number" id="limit" value="20" class="form-control mt-3" placeholder="Enter a number">
            </div>
            <div class="col-12 mt-3">
                <p>Character count: <span id="charCount">0</span></p>
            </div>
            <div class="col-12 mt-3 alert alert-warning" id="limit-alert" style="display: none;">
                <p>Please enter some text to see the character count.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
