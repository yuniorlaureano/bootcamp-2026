<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tip Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
  <body>
    <div class="container">
        <fieldset>
            <legend>Tip Calculator</legend>
            <form>
                <div class="mb-3">
                    <label for="bill-amount" class="form-label">Bill Amount</label>
                    <input type="number" class="form-control" id="bill-amount" name="billAmount" placeholder="Enter bill amount">
                </div>
                <div class="mb-3">
                    <label for="tip-percentage" class="form-label">Tip Percentage</label>
                    <input type="number" class="form-control" id="tip-percentage" name="tipPercentage" placeholder="Enter tip percentage">
                </div>
                <button type="submit" class="btn btn-primary">Calculate Tip</button>
            </form>
            <div class="mt-3">
                <h5>Tip Amount: <span id="tip-amount">0.00</span></h5>
                <h5>Total Amount: <span id="total-amount">0.00</span></h5>
            </div>
        </fieldset>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
