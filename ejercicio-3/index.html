<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Restaurant Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .menu-item {
            background-color: rgb(238, 186, 167); padding: 20px;
        }

        .menu-item-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .menu-item-description {
            margin: 0;color: white;font-size: 2rem;padding: 0;
        }

        .menu-item-separator {
            letter-spacing: 2px;color: white;font-size: 2rem;margin: 0;padding: 0;
        }
    </style>
</head>
  <body>
        <!-- main -->
         <main class="container mt-5">
            <header class="mb-4">
                <h1 class="text-center">Restaurant CSS</h1>
                <p class="text-center">Welcome to our restaurant! Explore our delicious menu below.</p>
            </header>
            <div class="container border">
                <section>
                        <header>
                            <h2>Appetizers</h2>
                        </header>
                        <div class="menu-item">
                            <figure class="d-flex flex-row align-items-center mb-3 justify-content-between">
                                <img src="https://images.unsplash.com/photo-1549203386-9d4394c8a2fe?q=80&w=1108&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
                                    alt="Caesar Salad" 
                                    class="img-thumbnail" 
                                    style="width: 200px; height: 200px;">
                                <div class="d-flex flex-column align-items-center">
                                    <p class="menu-item-description">Salad</p>
                                    <span class="menu-item-separator">-----------------------</span>
                                </div>
                                <figcaption class="menu-item-price">$45</figcaption>
                            </figure>
                        </div>
                   </section>
                   <hr>
                   <section>
                        <header>
                            <h2>Drinks</h2>
                        </header>
                        <div class="menu-item">
                            <figure class="d-flex flex-row align-items-center mb-3 justify-content-between">
                                <img src="https://images.unsplash.com/photo-1609951651556-5334e2706168?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
                                    alt="Caesar Salad" 
                                    class="img-thumbnail" 
                                    style="width: 200px; height: 200px;">
                                <div class="d-flex flex-column align-items-center">
                                    <p class="menu-item-description">Smoothie</p>
                                    <span class="menu-item-separator">-----------------------</span>
                                </div>
                                <figcaption class="menu-item-price">$56</figcaption>
                            </figure>
                        </div>
                   </section>
                   <hr>
                   <section>
                        <header>
                            <h2>Desserts</h2>
                        </header>
                        <div class="menu-item">
                            <figure class="d-flex flex-row align-items-center mb-3 justify-content-between">
                                <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=764&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
                                    alt="Caesar Salad" 
                                    class="img-thumbnail" 
                                    style="width: 200px; height: 200px;">
                                <div class="d-flex flex-column align-items-center">
                                    <p class="menu-item-description">Donuts</p>
                                    <span class="menu-item-separator">-----------------------</span>
                                </div>
                                <figcaption class="menu-item-price">$78</figcaption>
                            </figure>
                        </div>
                   </section>
            </div>
        </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
